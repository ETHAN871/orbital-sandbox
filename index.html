<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orbital Sandbox</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <div id="stage-wrap">
      <!-- V9.0b: single WebGL 2 canvas. renderer-webgl.js draws background,
           trail FBO, entity sprites + 9-ghost wrap mirrors (drawScene), and
           the UI overlay layers — hover ghost, drag preview, prediction
           line, selection ring, absorbing fallback (drawUI). -->
      <canvas id="stage" aria-label="重力场沙盒画布"></canvas>
      <!-- Shown if WebGL 2 is unavailable; renderer-webgl.js sets text + un-hides. -->
      <div id="webgl-error" role="alert" hidden></div>
    </div>

    <aside id="panel" aria-label="控制面板">
      <header class="panel-header">
        <h1>Orbital Sandbox</h1>
        <p class="hint" id="mode-hint">放置模式 · 按住拖拽放置星体</p>
        <p class="hint header-time" id="header-time">流速 1.00× · 真实 2.00×</p>
      </header>

      <section class="group">
        <h2>类型</h2>
        <div class="seg" role="radiogroup" aria-label="实体类型">
          <button class="seg-btn active" data-type="planet" role="radio" aria-checked="true">行星</button>
          <button class="seg-btn" data-type="black_hole" role="radio" aria-checked="false">黑洞</button>
        </div>
      </section>

      <section class="group">
        <h2>电荷</h2>
        <div class="seg" role="radiogroup" aria-label="电荷态">
          <button class="seg-btn" data-charge="-1" role="radio" aria-checked="false">−1 斥</button>
          <button class="seg-btn" data-charge="0" role="radio" aria-checked="false">0 中</button>
          <button class="seg-btn active" data-charge="1" role="radio" aria-checked="true">+1 引</button>
        </div>
      </section>

      <section class="group">
        <h2>属性</h2>
        <label>
          <span class="row"><span>质量</span><span class="val" id="mass-val">100</span></span>
          <input type="range" id="mass" min="1" max="1000" step="1" value="100" />
        </label>
        <label>
          <span class="row"><span>半径</span><span class="val" id="radius-val">1.00×</span></span>
          <input type="range" id="radius" min="0.1" max="10" step="0.05" value="1" />
        </label>
        <div class="btn-row" style="margin-top: 8px;">
          <button id="pending-pin-btn" class="btn" type="button">创建为固定</button>
        </div>
      </section>

      <section class="group">
        <h2>边界</h2>
        <div class="btn-row">
          <button id="boundary-btn" class="btn" type="button">循环边界</button>
        </div>
      </section>

      <section class="group">
        <h2>显示</h2>
        <label>
          <span class="row"><span>轨迹寿命</span><span class="val" id="trail-val">2.0 秒</span></span>
          <input type="range" id="trail" min="0" max="500" step="1" value="100" />
        </label>
      </section>

      <!-- V9.1: gravitational field visualization. Default OFF → drawField is
           gated by state.showField, so zero GPU cost when hidden. -->
      <section class="group">
        <h2>场可视化</h2>
        <div class="btn-row">
          <button id="field-btn" class="btn" type="button">显示场</button>
        </div>
        <p class="hint">等势线 + 同步脉冲流线（地形图风格）</p>
      </section>

      <details class="group collapsible">
        <summary>线宽设置</summary>
        <label>
          <span class="row"><span>轨迹线宽</span><span class="val" id="trail-width-val">3.0 px</span></span>
          <input type="range" id="trail-width" min="1" max="6" step="0.5" value="3" />
        </label>
      </details>

      <section class="group">
        <h2>时间</h2>
        <label>
          <span class="row"><span>流速</span><span class="val" id="time-scale-val">1.00x</span></span>
          <input type="range" id="time-scale" min="0" max="3" step="0.05" value="1" />
        </label>
        <div class="btn-row">
          <button id="pause-btn" class="btn">暂停</button>
        </div>
      </section>

      <section class="group">
        <h2>操作</h2>
        <div class="btn-row">
          <button id="edit-btn" class="btn">编辑模式</button>
          <button id="clear-btn" class="btn danger">清空沙盘</button>
        </div>
        <div class="btn-row" style="margin-top: 8px;">
          <button id="bg-theme-btn" class="btn" type="button">浅色背景</button>
        </div>
        <div class="btn-row" style="margin-top: 8px;">
          <button id="dump-state-btn" class="btn" type="button" title="按 D 键也可触发">状态快照 (D)</button>
        </div>
        <p class="hint" id="selection-hint" hidden></p>
      </section>

      <section class="group" id="selection-controls" hidden>
        <h2>选中实体</h2>
        <div class="btn-row">
          <button id="pin-btn" class="btn">固定</button>
          <button id="delete-entity-btn" class="btn danger">删除</button>
        </div>
      </section>

      <details class="group collapsible" id="advanced-tuning">
        <summary>高级调参</summary>
        <label>
          <span class="row"><span>引力常数 G</span><span class="val" id="tune-G-val">80</span></span>
          <input type="range" id="tune-G" min="10" max="500" step="5" value="80" />
        </label>
        <label>
          <span class="row"><span>弹性系数 e</span><span class="val" id="tune-restitution-val">0.30</span></span>
          <input type="range" id="tune-restitution" min="0" max="1" step="0.05" value="0.3" />
        </label>
        <label>
          <span class="row"><span>弹弓速度系数</span><span class="val" id="tune-K-val">0.70</span></span>
          <input type="range" id="tune-K" min="0.1" max="2" step="0.05" value="0.7" />
        </label>
        <label>
          <span class="row"><span>吞噬时长</span><span class="val" id="tune-absorb-val">0.3 秒</span></span>
          <input type="range" id="tune-absorb" min="0.1" max="2" step="0.1" value="0.3" />
        </label>
        <label>
          <span class="row"><span>软化距离 ε</span><span class="val" id="tune-eps-val">4.0 px</span></span>
          <input type="range" id="tune-eps" min="0" max="30" step="0.5" value="4" />
        </label>
        <label>
          <span class="row"><span>预测时长</span><span class="val" id="tune-predict-val">5.0 秒</span></span>
          <input type="range" id="tune-predict" min="1" max="15" step="0.5" value="5" />
        </label>
        <label title="同时接触对超过此值时，求解器自动加倍迭代次数；0 = 永远加倍；20 = 实际不会触发。默认 4 适合典型场景。">
          <span class="row"><span>过穿自适应阈值</span><span class="val" id="tune-overlap-val">4</span></span>
          <input type="range" id="tune-overlap" min="0" max="20" step="1" value="4" />
        </label>
        <div class="btn-row" style="margin-top: 8px;">
          <button id="tune-reset-btn" class="btn" type="button">恢复默认</button>
        </div>
      </details>

      <footer class="panel-footer">
        <span id="entity-count">0 个实体</span>
      </footer>
    </aside>
  </div>

  <script type="importmap">
  {
    "imports": {
      "d3-quadtree": "https://esm.sh/d3-quadtree@3",
      "planck": "https://esm.sh/planck@1.5.0",
      "stats.js": "https://esm.sh/stats.js@0.17.0",
      "@dimforge/rapier2d-compat": "https://esm.sh/@dimforge/rapier2d-compat@0.19.3"
    }
  }
  </script>
  <!-- Cache-buster: bump this when shipping changes that need a fresh module
       load (Chrome holds onto module bytes aggressively across reloads). -->
  <script type="module" src="src/main.js?v=20260524-dump"></script>
</body>
</html>
